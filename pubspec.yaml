name: manahflow
description: "Construction DPR & Payment Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0
  fl_chart: ^0.69.0
  provider: ^6.0.0
  google_fonts: ^6.0.0
  auth0_flutter: ^2.0.1
  supabase_flutter: ^2.12.4
  logger: ^2.7.0
  shared_preferences: ^2.5.5
  flutter_dotenv: ^6.0.1
  image_picker: ^1.2.1
  file_picker: ^8.1.0
  pdf: ^3.11.0
  printing: ^5.13.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - logo.jpg
    - manah.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logo.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#1A3C6E"
  adaptive_icon_foreground: "logo.jpg"
  padding: 8

flutter_native_splash:
  color: "#1A3C6E"
  image: "logo.jpg"
  android: true
  ios: true
  web: false
